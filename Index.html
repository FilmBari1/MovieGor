    <style>
        :root {
            --bg-color: #07040d;
            --bg-gradient: radial-gradient(circle at 50% 20%, #150d2c, #07040d);
            --surface-color: #120b22;
            --surface-card: #18102a;

        * {

            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif;

        /* App Container */

        /* Top Header & Custom Logo sticky */

        /* Left Menu Trigger Button (☰) */

        .slider-wrapper {
            display: flex;
            overflow-x: auto;

        .poster-container {

            height: auto; 
            min-height: 90px;
            max-height: 240px;

            position: relative;

            justify-content: center;
        }
        .poster-container img {

        .card-body {

        /* Share Button in Card */
        .share-card-btn {

            transition: transform 0.2s;
            padding: 4px;

        /* Custom Modal Popup */
        .modal {

            position: fixed;

            left: 0;

        return num + ' Views';

    // ৪. ১০০% ডায়নামিক রেন্ডারিং লজিক (ক্যাটাগরি বাড়ালে/কমালে অটোমেটিক অ্যাড ও রিমুভ হবে)
    function renderAllContent() {
        updateLogoBranding(); // আপডেট লোগো ব্র্যান্ডিং

        const dynamicContainer = document.getElementById('dynamic-categories-container');
        dynamicContainer.innerHTML = ""; // আগের কন্টেন্ট ক্লিয়ার

        const bannerSlider = document.getElementById('banner-slider');
        const carouselDots = document.getElementById('carousel-dots');
        bannerSlider.innerHTML = "";
        carouselDots.innerHTML = "";

        const keys = Object.keys(globalVideoData).reverse();
        
        // ডায়নামিক ক্যাটাগরি গ্রুপিং ম্যাপ
        let categoriesMap = {};
        let bannerVideos = [];

        keys.forEach((key) => {
            const v = globalVideoData[key];
            const rawCategory = v.category || 'bangla';
            const isAdult = v.isAdult === true || isAdultCategory(rawCategory); // ডায়নামিক ও ওল্ড ডেটাবেজ উভয় ফিল্টারিং সাপোর্ট

            // 18+ Adult সুইচ অনুযায়ী কনটেন্ট ফিল্টার করা
            if (isAdultMode && !isAdult) return; // অ্যাডাল্ট মোডে সাধারণ কন্টেন্ট হাইড
            if (!isAdultMode && isAdult) return;  // সাধারণ মোডে অ্যাডাল্ট কন্টেন্ট হাইড

            // স্লাইডার ব্যানারের জন্য কন্ডিশনাল বাছাই (isBanner === true থাকলে)
            if (v.isBanner === true) {
                bannerVideos.push({ key, ...v });
            }

            // ডায়নামিক ক্যাটাগরি তৈরি (কোনো বানান সংশোধন ছাড়াই সরাসরি ডাটাবেজের নাম অনুযায়ী হুবহু তৈরি হবে)
            const formattedCategoryName = formatCategoryName(rawCategory);
            if (!categoriesMap[formattedCategoryName]) {
                categoriesMap[formattedCategoryName] = [];
            }
            categoriesMap[formattedCategoryName].push({ key, ...v });
        });

        // যদি কোনো ভিডিও ম্যানুয়ালি ব্যানার হিসেবে সিলেক্ট করা না থাকে, তবে লেটেস্ট ৪টি ভিডিও অটো শো করবে (উভয় মোডেই)
        if (bannerVideos.length === 0) {
            if (isAdultMode) {
                // ১৮+ অ্যাডাল্ট স্লাইডারের ব্যানার আপনি এডমিন প্যানেল থেকে অ্যাড না করলে এটি শো হবে না
                bannerSlider.style.display = "none";
                carouselDots.style.display = "none";
            } else {
                // ফ্যামিলি মোডে অটো ব্যাকআপ স্লাইডার শো করবে
                bannerSlider.style.display = "block";
                carouselDots.style.display = "flex";
                keys.forEach((key) => {
                    const v = globalVideoData[key];
                    const rawCategory = v.category || 'bangla';
                    const isAdult = v.isAdult === true || isAdultCategory(rawCategory);
                    if (!isAdult && bannerVideos.length < 4) {
                        bannerVideos.push({ key, ...v });
                    }
                });
            }
        } else {
            bannerSlider.style.display = "block";
            carouselDots.style.display = "flex";
        }

        // ৫. স্লাইড-আউট ক্যাটাগরি মেনু (☰) আইটেম জেনারেট করা
        const drawerMenuList = document.getElementById('drawer-menu-list');
        const drawerTitle = document.getElementById('drawer-title-text');
        
        drawerTitle.innerText = isAdultMode ? "PORN TUBE MENU" : "MOVIEGOR MENU";

        // Home অপশনটি সবসময় ওপরে থাকবে
        let menuHTML = `
            <div class="drawer-item ${selectedCategory === 'Home' ? 'active' : ''}" onclick="selectCategoryView('Home')">
                <i class="fa-solid fa-house"></i> Home
            </div>
        `;

        // ডায়নামিক ক্যাটাগরিগুলো তালিকায় যুক্ত করা
        Object.keys(categoriesMap).sort().forEach(catName => {
            menuHTML += `
                <div class="drawer-item ${selectedCategory === catName ? 'active' : ''}" onclick="selectCategoryView('${catName}')">
                    <i class="fa-solid fa-clapperboard"></i> ${catName}
                </div>
            `;
        });
        drawerMenuList.innerHTML = menuHTML;

        // স্লাইডার ব্যানার ফিল আপ
        if (bannerVideos.length > 0) {
            bannerVideos.slice(0, 4).forEach((v, i) => {
                const slideImg = v.bannerThumb || v.thumb; // স্লাইডারের জন্য ব্যানার ইমেজ না থাকলে মেইন ইমেজ টাই শো করবে
                const slideHTML = `
                    <div class="banner-slide ${i === 0 ? 'active' : ''}" style="background-image: url('${slideImg}');">
                        <div class="banner-overlay">
                            <div class="banner-info">
                                <div class="banner-tag">🔥 Trending Now</div>
                                <div class="banner-title">${v.title || 'MovieGor'}</div>
                            </div>
                            <button class="banner-btn" onclick="scrollToCard('${v.key}')">
                                <i class="fa-solid fa-play"></i> Watch Now
                            </button>
                        </div>
                    </div>
                `;
                bannerSlider.innerHTML += slideHTML;

                const dotHTML = `<div class="dot ${i === 0 ? 'active' : ''}"></div>`;
                carouselDots.innerHTML += dotHTML;
            });
            startBannerAutoCycle();
        }

        // ৬. সিলেক্ট করা একটিভ ভিউ লোড করা
        renderActiveView(categoriesMap);
    }

    // ৭. একটিভ ক্যাটাগরি ভিউ রেন্ডারার (Home বনাম ক্যাটাগরি পেজ)
    function renderActiveView(categoriesMap) {
        const dynamicContainer = document.getElementById('dynamic-categories-container');
        const categoryPageView = document.getElementById('category-page-view');
        const bannerSlider = document.getElementById('banner-slider');
        const carouselDots = document.getElementById('carousel-dots');
        const sharePromoBox = document.getElementById('share-promo-container');

        if (selectedCategory === 'Home') {
            // হোম পেজ লেআউট রেন্ডার
            categoryPageView.style.display = "none";
            dynamicContainer.style.display = "block";
            sharePromoBox.style.display = "flex";

            if (bannerSlider.querySelectorAll('.banner-slide').length > 0) {
                bannerSlider.style.display = "block";
                carouselDots.style.display = "flex";
            }

            // ডায়নামিক রো হোম পেজে তৈরি করা
            Object.keys(categoriesMap).forEach(catName => {
                const videos = categoriesMap[catName];
                if (videos.length === 0) return;

                let rowHTML = `
                    <div class="category-row has-content">
                        <div class="category-title">${catName}</div>
                        <div class="slider-wrapper">
                `;

                videos.forEach(v => {
                    const formattedViews = formatViews(v.views);
                    rowHTML += `
                        <div class="video-card" id="card-${v.key}">
                            <div class="poster-container" onclick="openDirectLink()">
                                <img src="${v.thumb}" alt="${v.title}">
                            </div>
                            <div class="card-body">
                                <h4>${v.title}</h4>
                                <p class="card-subtitle">
                                    <i class="fa-regular fa-eye"></i> ${formattedViews}
                                    <i class="fa-solid fa-share-nodes share-card-btn" onclick="shareVideo('${v.key}', '${v.title}')"></i>
                                </p>
                                <button class="action-btn unlock-btn" id="btn-${v.key}" onclick="startAdProcess('${v.key}', '${v.url}')">Unlock ${v.ads || 5} Ads</button>
                                <a href="javascript:void(0)" id="open-${v.key}" class="action-btn open-btn" onclick="finalOpen('${v.url}', '${v.key}', ${v.ads || 5})">WATCH NOW</a>
                            </div>
                        </div>
                    `;
                });

                rowHTML += `
                        </div>
                    </div>
                `;
                
                dynamicContainer.innerHTML += rowHTML;
            });

        } else {
            // ক্যাটাগরি পেজ লেআউট রেন্ডার
            dynamicContainer.style.display = "none";
            sharePromoBox.style.display = "flex"; // নির্দিষ্ট ক্যাটাগরি সিলেক্ট করলেও প্রমো বক্স দৃশ্যমান থাকবে
            categoryPageView.style.display = "block";
            
            // ক্যাটাগরি পেজে ব্যানার স্লাইডার সম্পূর্ণ হাইড থাকবে
            bannerSlider.style.display = "none";
            carouselDots.style.display = "none";

            renderCategoryPage(selectedCategory);
        }
    }

    // ৮. ১০টি করে মুভি সহ পেজিনেশন পেজ রেন্ডারার
    function renderCategoryPage(catName) {
        const keys = Object.keys(globalVideoData).reverse();
        let catVideos = [];

        keys.forEach(key => {
            const v = globalVideoData[key];
            const rawCategory = v.category || 'bangla';
            const formattedCategoryName = formatCategoryName(rawCategory);
            const isAdult = v.isAdult === true || isAdultCategory(rawCategory);

            if (isAdultMode && !isAdult) return;
            if (!isAdultMode && isAdult) return;

            if (formattedCategoryName === catName) {
                catVideos.push({ key, ...v });
            }
        });

        document.getElementById('category-page-title').innerText = catName;

        const totalItems = catVideos.length;
        const totalPages = Math.ceil(totalItems / itemsPerPage);
        
        if (currentPage < 1) currentPage = 1;
        if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;

        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const paginatedVideos = catVideos.slice(startIndex, endIndex);

        const grid = document.getElementById('category-video-grid');
        grid.innerHTML = "";

        if (paginatedVideos.length === 0) {
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px 0;">এই ক্যাটাগরিতে কোনো ভিডিও নেই।</p>`;
            document.getElementById('pagination-container').innerHTML = "";
            return;
        }

        paginatedVideos.forEach(v => {
            const formattedViews = formatViews(v.views);
            grid.innerHTML += `
                <div class="video-card" id="card-${v.key}">
                    <div class="poster-container" onclick="openDirectLink()">
                        <img src="${v.thumb}" alt="${v.title}">
                    </div>
                    <div class="card-body">
                        <h4>${v.title}</h4>
                        <p class="card-subtitle">
                            <i class="fa-regular fa-eye"></i> ${formattedViews}
                            <i class="fa-solid fa-share-nodes share-card-btn" onclick="shareVideo('${v.key}', '${v.title}')"></i>
                        </p>
                        <button class="action-btn unlock-btn" id="btn-${v.key}" onclick="startAdProcess('${v.key}', '${v.url}')">Unlock ${v.ads || 5} Ads</button>
                        <a href="javascript:void(0)" id="open-${v.key}" class="action-btn open-btn" onclick="finalOpen('${v.url}', '${v.key}', ${v.ads || 5})">WATCH NOW</a>
                    </div>
                </div>
            `;
        });

        renderPaginationControls(totalPages);
    }

    function renderPaginationControls(totalPages) {
        const pagContainer = document.getElementById('pagination-container');
        pagContainer.innerHTML = "";

        if (totalPages <= 1) return;

        // Prev Button
        const prevBtn = document.createElement('button');
        prevBtn.className = `page-btn ${currentPage === 1 ? 'disabled' : ''}`;
        prevBtn.innerHTML = `<i class="fa-solid fa-chevron-left"></i>`;
        prevBtn.onclick = () => { 
            if (currentPage > 1) { 
                currentPage--; 
                renderCategoryPage(selectedCategory); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } 
        };
        pagContainer.appendChild(prevBtn);

        // Page Number Buttons
        for (let i = 1; i <= totalPages; i++) {
            const pageBtn = document.createElement('button');
            pageBtn.className = `page-btn ${currentPage === i ? 'active' : ''}`;
            pageBtn.innerText = i;
            pageBtn.onclick = () => { 
                currentPage = i; 
                renderCategoryPage(selectedCategory); 
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            };
            pagContainer.appendChild(pageBtn);
        }

        // Next Button
        const nextBtn = document.createElement('button');
        nextBtn.className = `page-btn ${currentPage === totalPages ? 'disabled' : ''}`;
        nextBtn.innerHTML = `<i class="fa-solid fa-chevron-right"></i>`;
        nextBtn.onclick = () => { 
            if (currentPage < totalPages) { 
                currentPage++; 
                renderCategoryPage(selectedCategory); 
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } 
        };
        pagContainer.appendChild(nextBtn);
    }

    // ৯. মেনু কন্ট্রোলার সিলেকশন ট্র্যাকার
    window.selectCategoryView = (categoryName) => {
        selectedCategory = categoryName;
        currentPage = 1; // পেজ রিসেট
        closeSidebarMenu();
        
        renderAllContent();
    };

    window.toggleSidebarMenu = () => {
        const drawer = document.getElementById('sidebar-drawer');
        const overlay = document.getElementById('drawer-overlay');
        if (drawer && overlay) {
            drawer.classList.add('active');
            overlay.classList.add('active');
        }
    };

    window.closeSidebarMenu = () => {
        const drawer = document.getElementById('sidebar-drawer');
        const overlay = document.getElementById('drawer-overlay');
        if (drawer && overlay) {
            drawer.classList.remove('active');
            overlay.classList.remove('active');
        }
    };

    // ১০. ব্যানার অটোমেটিক স্লাইড সাইকেল
    let autoSlideInterval;
    function startBannerAutoCycle() {
        if (autoSlideInterval) clearInterval(autoSlideInterval);
        
        const slides = document.querySelectorAll('.banner-slide');
        const dots = document.querySelectorAll('.dot');
        if (slides.length <= 1) return;

        let activeIdx = 0;
        autoSlideInterval = setInterval(() => {
            slides[activeIdx].classList.remove('active');
            dots[activeIdx].classList.remove('active');
            
            activeIdx = (activeIdx + 1) % slides.length;
            
            slides[activeIdx].classList.add('active');
            dots[activeIdx].classList.add('active');
        }, 4000);
    }

    // ১১. ব্যানার Watch Now ক্লিক স্ক্রোল ও হাইলাইট
    window.scrollToCard = (key) => {
        const targetCard = document.getElementById('card-' + key);
        if (targetCard) {
            targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            targetCard.classList.add('highlight');
            setTimeout(() => {
                targetCard.classList.remove('highlight');
            }, 3000);
        }
    };

    // ১২. রিয়েল-টাইম সার্চ লজিক
    window.handleSearch = (query) => {
        const searchResultsSection = document.getElementById('search-results-section');
        const searchResultsGrid = document.getElementById('search-results-grid');
        const mainContentLayout = document.getElementById('main-content-layout');
        const bannerSlider = document.getElementById('banner-slider');
        const carouselDots = document.getElementById('carousel-dots');

        const q = query.trim().toLowerCase();

        if (q === "") {
            searchResultsSection.classList.remove('active');
            mainContentLayout.style.display = "block";
            if (bannerSlider.querySelectorAll('.banner-slide').length > 0) {
                bannerSlider.style.display = "block";
                carouselDots.style.display = "flex";
            }
            return;
        }

        searchResultsSection.classList.add('active');
        mainContentLayout.style.display = "none";
        bannerSlider.style.display = "none";
        carouselDots.style.display = "none";

        searchResultsGrid.innerHTML = "";
        let found = false;

        Object.keys(globalVideoData).reverse().forEach(key => {
            const v = globalVideoData[key];
            const title = v.title.toLowerCase();
            const rawCategory = v.category || 'bangla';
            const category = formatCategoryName(rawCategory); // Use raw exact name
            const isAdult = v.isAdult === true || isAdultCategory(rawCategory);

            // মোড অনুযায়ী ফিল্টারিং
            if (isAdultMode && !isAdult) return;
            if (!isAdultMode && isAdult) return;

            if (title.includes(q)) {
                found = true;
                const formattedViews = formatViews(v.views);
                const cardHTML = `
                    <div class="video-card">
                        <!-- সার্চ বক্সে ছবিতে চাপ দিলে ডিরেক্ট লিংক ওপেন হবে, ভিউ কাউন্ট হবে না -->
                        <div class="poster-container" onclick="openDirectLink()">
                            <img src="${v.thumb}" alt="${v.title}">
                        </div>
                        <div class="card-body">
                            <h4>${v.title}</h4>
                            <p class="card-subtitle"><i class="fa-regular fa-eye"></i> ${formattedViews} <i class="fa-solid fa-share-nodes share-card-btn" onclick="shareVideo('${key}', '${v.title}')"></i></p>
                            <button class="action-btn unlock-btn" id="btn-${key}" onclick="startAdProcess('${key}', '${v.url}')">Unlock ${v.ads || 5} Ads</button>
                            <a href="javascript:void(0)" id="open-${key}" class="action-btn open-btn" onclick="finalOpen('${v.url}', '${key}', ${v.ads || 5})">WATCH NOW</a>
                        </div>
                    </div>
                `;
                searchResultsGrid.innerHTML += cardHTML;
            }
        });

        if (!found) {
            searchResultsGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px 0;">কোনো মুভি খুঁজে পাওয়া যায়নি!</p>`;
        }
    };

    // ১৩. সার্চ বার টগল করা
    window.toggleSearchBar = () => {
        const searchBar = document.getElementById('search-bar-container');
        searchBar.classList.toggle('active');
        if (searchBar.classList.contains('active')) {
            document.getElementById('searchInput').focus();
        } else {
            clearSearch();
        }
    };

    window.clearSearch = () => {
        document.getElementById('searchInput').value = "";
        handleSearch("");
        
        // সার্চ বার ক্লিয়ারের সাথে সাথে স্লাইড ব্যাকআপ হয়ে যাবে
        const searchBar = document.getElementById('search-bar-container');
        if (searchBar) {
            searchBar.classList.remove('active');
        }
    };

    // ১৪. টেলিগ্রাম ট্র্যাকিং
    window.handleTelegramClick = () => {
        const today = getLocalDateString();
        const updates = {};
        updates[`stats/telegramClicks/${today}`] = increment(1);
        update(ref(db), updates);
    };

    // ১৫. ভিউ ট্র্যাকিং ফাংশন (যা শুধুমাত্র Unlock Ads বাটনে চাপ দিলে ফায়ার হবে)
    window.trackView = (key) => {
        const today = getLocalDateString();
        const updates = {};
        updates[`content/videos/${key}/views`] = increment(1);
        updates[`stats/dailyViews/${today}`] = increment(1);
        update(ref(db), updates);
    };

    // ১৬. অ্যাড প্রসেসিং ও ভিউ কাউন্টিং লজিক
    window.startAdProcess = (key, videoUrl) => {
        const btn = document.getElementById('btn-' + key);
        const openBtn = document.getElementById('open-' + key);

        // ভিউ কাউন্ট লজিক: প্রথম ক্লিকে কাউন্ট হবে, একই পেজ সেশনে দ্বিতীয়বার হবে না
        if (!countedViews[key]) {
            countedViews[key] = true;
            window.trackView(key);
        }

        let count = parseInt(btn.innerText.match(/\d+/)) || 0;
        if (count > 1) {
            // মোনিটেগ হাই-সিপিএম ডিরেক্ট অ্যাড লিংক ওপেন হবে
            window.open("https://omg10.com/4/11115512", '_blank');
            // বাটন কাউন্ট কমবে
            btn.innerText = `Unlock ${count - 1} Ads`;
        } else {
            // লাস্ট ক্লিকে বাটন পরিবর্তন হয়ে গোল্ডেন WATCH NOW আসবে
            btn.style.display = 'none';
            openBtn.style.display = 'block';
        }
    };

    window.openDirectLink = () => { window.open(directLink, '_blank'); };

    // ডাইনামিক কম্বাইন্ড ডিরেক্ট লিংক + মুভি লিংক ওপেনার এবং কার্ড রিসেটার
    window.finalOpen = (videoUrl, key, originalAds) => {
        // ১. প্রথমে ডিরেক্ট লিংক নতুন ট্যাবে ওপেন হবে
        window.open(directLink, '_blank');
        // ২. মূল উইন্ডোতে মুভি ফাইলে রিডাইরেক্ট হবে
        setTimeout(() => { window.location.href = videoUrl; }, 800);

        // ৩. ব্যবহারকারী যদি পরবর্তীতে আবারো দেখতে চায়, তার জন্য কার্ডটিকে আগের আনলক অবস্থায় রিসেট করা
        if (key) {
            countedViews[key] = false; // ভিউ ট্র্যাকিং পুনরায় সক্রিয় করার জন্য রিসেট
            const btn = document.getElementById('btn-' + key);
            const openBtn = document.getElementById('open-' + key);
            if (btn && openBtn) {
                btn.innerText = `Unlock ${originalAds} Ads`;
                btn.style.display = 'block'; // আনলক বাটন পুনরায় ফিরিয়ে আনা
                openBtn.style.display = 'none'; // ওয়াচ নাও বাটন হাইড করা
            }
        }
    };

    // ১৭. 18+ মোড টগল (বিজ্ঞাপন ফায়ারিং বন্ধের জন্য ইভেন্ট প্রপাগেশন লক করা হয়েছে)
    window.toggleAdultMode = (e) => {
        if (e) {
            e.stopPropagation(); // Onclick (Popunder) বিজ্ঞাপনের ফায়ারিং বন্ধ করার জন্য ইভেন্ট প্রপাগেশন লক করা হয়েছে
            e.stopImmediatePropagation();
        }
        isAdultMode = !isAdultMode;
        sessionStorage.setItem('isAdultMode', isAdultMode ? 'true' : 'false');
        
        selectedCategory = 'Home'; // মোড পরিবর্তন করলে ক্যাটাগরি পেজ থেকে সরাসরি হোমপেজে রি-ডাইরেক্ট হবে
        currentPage = 1;

        const adultBtn = document.getElementById('adult-toggle-btn');
        if (isAdultMode) {
            adultBtn.classList.add('active');
        } else {
            adultBtn.classList.remove('active');
        }
        
        clearSearch();
        renderAllContent();
    };

    // ১৮. গাইড মডাল কন্ট্রোল
    window.openDownloadModal = () => {
        document.getElementById('helpModal').style.display = 'flex';
    };
    window.closeDownloadModal = () => {
        document.getElementById('helpModal').style.display = 'none';
    };

    // ১৯. স্বাগতম ও প্রমোশনাল পপআপ মডাল বন্ধের লজিক
    window.closeAttentionModal = () => {
        const attModal = document.getElementById('attentionModal');
        if (attModal) attModal.style.display = 'none';
        sessionStorage.setItem('welcomeShown', 'true'); // এক ব্রাউজার সেশনে আর দ্বিতীয়বার দেখাবে না
    };

    // ল্যাঙ্গুয়েজ ডিটেক্ট ও পেজ রেন্ডারিং ইনিশিয়ালাইজেশন
    window.addEventListener('load', () => {
        detectLanguageAndLocalize();
        
        const adultBtn = document.getElementById('adult-toggle-btn');
        if (isAdultMode) {
            adultBtn.classList.add('active');
        }
    });
</script>
</body>
</html>
