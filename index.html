    function formatCategoryName(rawName) {
        if (!rawName) return 'General';
        const trimmed = rawName.trim();

    }

    function formatViews(count) {
        if (!count) return "0 Views";
        const num = Number(count);
        if (isNaN(num)) return "0 Views";
        if (num >= 1000000) {
            return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'M Views';
        }
        if (num >= 1000) {
            return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'k Views';
        }
        return num + ' Views';
    }

                                <div class="banner-title">${v.title || 'MovieGor'}</div>
                            </div>
                            <button class="banner-btn" onclick="scrollToCard('${v.key}')">
                                <i class="fa-solid fa-play"></i> Watch Now
                            </button>
                        </div>
                    </div>
                `;
                bannerSlider.innerHTML += slideHTML;

                const dotHTML = `<div class="dot ${i === 0 ? 'active' : ''}"></div>`;
                carouselDots.innerHTML += dotHTML;
            });
            startBannerAutoCycle();
        }
    }

    // ৫. ব্যানার অটোমেটিক স্লাইড সাইকেল
    let autoSlideInterval;
    function startBannerAutoCycle() {
        if (autoSlideInterval) clearInterval(autoSlideInterval);
        
        const slides = document.querySelectorAll('.banner-slide');
        const dots = document.querySelectorAll('.dot');
        if (slides.length <= 1) return;

        let activeIdx = 0;
        autoSlideInterval = setInterval(() => {
            slides[activeIdx].classList.remove('active');
            dots[activeIdx].classList.remove('active');
            
            activeIdx = (activeIdx + 1) % slides.length;
            
            slides[activeIdx].classList.add('active');
            dots[activeIdx].classList.add('active');
        }, 4000);
    }

    // ৪. ব্যানার Watch Now ক্লিক স্ক্রোল ও হাইলাইট
    window.scrollToCard = (key) => {
        const targetCard = document.getElementById('card-' + key);
        if (targetCard) {
            targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            targetCard.classList.add('highlight');
            setTimeout(() => {
                targetCard.classList.remove('highlight');
            }, 3000);
        }
    };

    // ৫. রিয়েল-টাইম সার্চ লজিক
    window.handleSearch = (query) => {
        const searchResultsSection = document.getElementById('search-results-section');
        const searchResultsGrid = document.getElementById('search-results-grid');
        const mainContentLayout = document.getElementById('main-content-layout');
        const bannerSlider = document.getElementById('banner-slider');
        const carouselDots = document.getElementById('carousel-dots');

        const q = query.trim().toLowerCase();

        if (q === "") {
            searchResultsSection.classList.remove('active');
            mainContentLayout.style.display = "block";
            if (bannerSlider.querySelectorAll('.banner-slide').length > 0) {
                bannerSlider.style.display = "block";
                carouselDots.style.display = "flex";
            }
            return;
        }

        searchResultsSection.classList.add('active');
        mainContentLayout.style.display = "none";
        bannerSlider.style.display = "none";
        carouselDots.style.display = "none";

        searchResultsGrid.innerHTML = "";
        let found = false;

        Object.keys(globalVideoData).reverse().forEach(key => {
            const v = globalVideoData[key];
            const title = v.title.toLowerCase();
            const rawCategory = v.category || 'bangla';
            const category = formatCategoryName(rawCategory); // Use raw exact name
            const isAdult = v.isAdult === true || isAdultCategory(rawCategory);

            // মোড অনুযায়ী ফিল্টারিং
            if (isAdultMode && !isAdult) return;
            if (!isAdultMode && isAdult) return;

            if (title.includes(q)) {
                found = true;
                const formattedViews = formatViews(v.views);
                const cardHTML = `
                    <div class="video-card">
                        <!-- সার্চ বক্সে ছবিতে চাপ দিলে ডিরেক্ট লিংক ওপেন হবে, ভিউ কাউন্ট হবে না -->
                        <div class="poster-container" onclick="openDirectLink()">
                            <img src="${v.thumb}" alt="${v.title}">
                        </div>
                        <div class="card-body">
                            <h4>${v.title}</h4>
                            <p class="card-subtitle"><i class="fa-regular fa-eye"></i> ${formattedViews} <i class="fa-solid fa-share-nodes share-card-btn" onclick="shareVideo('${key}', '${v.title}')"></i></p>
                            <button class="action-btn unlock-btn" id="btn-${key}" onclick="startAdProcess('${key}', '${v.url}')">Unlock ${v.ads || 5} Ads</button>
                            <a href="javascript:void(0)" id="open-${key}" class="action-btn open-btn" onclick="finalOpen('${v.url}')">WATCH NOW</a>
                        </div>
                    </div>
                `;
                searchResultsGrid.innerHTML += cardHTML;
            }
        });

        if (!found) {
            searchResultsGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 40px 0;">কোনো মুভি খুঁজে পাওয়া যায়নি!</p>`;
        }
    };

    // ৬. সার্চ বার টগল করা
    window.toggleSearchBar = () => {
        const searchBar = document.getElementById('search-bar-container');
        searchBar.classList.toggle('active');
        if (searchBar.classList.contains('active')) {
            document.getElementById('searchInput').focus();
        } else {
            clearSearch();
        }
    };

    window.clearSearch = () => {
        document.getElementById('searchInput').value = "";
        handleSearch("");
        
        // সার্চ বার ক্লিয়ারের সাথে সাথে স্লাইড ব্যাকআপ হয়ে যাবে
        const searchBar = document.getElementById('search-bar-container');
        if (searchBar) {
            searchBar.classList.remove('active');
        }
    };

    // ७. টেলিগ্রাম ট্র্যাকিং
    window.handleTelegramClick = () => {
        const today = getLocalDateString();
        const updates = {};
        updates[`stats/telegramClicks/${today}`] = dbIncrement(1);
        dbUpdate(dbRef(db), updates);
    };

    // ৮. ভিউ ট্র্যাকিং ফাংশন (যা শুধুমাত্র Unlock Ads বাটনে চাপ দিলে ফায়ার হবে)
    window.trackView = (key) => {
        const today = getLocalDateString();
        const updates = {};
        updates[`content/videos/${key}/views`] = dbIncrement(1);
        updates[`stats/dailyViews/${today}`] = dbIncrement(1);
        dbUpdate(dbRef(db), updates);
    };

    // ৯. অ্যাড প্রসেসিং ও ভিউ কাউন্টিং লজিক
    window.startAdProcess = (key, videoUrl) => {
        const btn = document.getElementById('btn-' + key);
        const openBtn = document.getElementById('open-' + key);

        // ভিউ কাউন্ট লজিক: প্রথম ক্লিকে কাউন্ট হবে, একই পেজ সেশনে দ্বিতীয়বার হবে না
        if (!countedViews[key]) {
            countedViews[key] = true;
            window.trackView(key);
        }

        let count = parseInt(btn.innerText.match(/\d+/)) || 0;
        if (count > 1) {
            // মোনিটেগ হাই-সিপিএম ডিরেক্ট অ্যাড লিংক ওপেন হবে
            window.open("https://omg10.com/4/11115512", '_blank');
            // বাটন কাউন্ট কমবে
            btn.innerText = `Unlock ${count - 1} Ads`;
        } else {
            // লাস্ট ক্লিকে বাটন পরিবর্তন হয়ে গোল্ডেন WATCH NOW আসবে
            btn.style.display = 'none';
            openBtn.style.display = 'block';
        }
    };

    window.openDirectLink = () => { window.open(directLink, '_blank'); };

    // ডাইনামিক কম্বাইন্ড ডিরেক্ট লিংক + মুভি লিংক ওপেনার
    window.finalOpen = (videoUrl) => {
        // ১. প্রথমে ডিরেক্ট লিংক নতুন ট্যাবে ওপেন হবে
        window.open(directLink, '_blank');
        // ২. মূল উইন্ডোতে মুভি ফাইলে রিডাইরেক্ট হবে
        setTimeout(() => { window.location.href = videoUrl; }, 800);
    };

    // ১০. 18+ মোড টগল (বিজ্ঞাপন ফায়ারিং বন্ধের জন্য ইভেন্ট প্রপাগেশন লক করা হয়েছে)
    window.toggleAdultMode = (e) => {
        if (e) {
            e.stopPropagation(); // Onclick (Popunder) বিজ্ঞাপনের ফায়ারিং বন্ধ করার জন্য ইভেন্ট প্রপাগেশন লক করা হয়েছে
        }
        isAdultMode = !isAdultMode;
        localStorage.setItem('isAdultMode', isAdultMode ? 'true' : 'false');
        
        const adultBtn = document.getElementById('adult-toggle-btn');
        if (isAdultMode) {
            adultBtn.classList.add('active');
        } else {
            adultBtn.classList.remove('active');
        }
        
        clearSearch();
        renderAllContent();
    };

    // ১১. গাইড মডাল কন্ট্রোল
    window.openDownloadModal = () => {
        document.getElementById('helpModal').style.display = 'flex';
    };
    window.closeDownloadModal = () => {
        document.getElementById('helpModal').style.display = 'none';
    };

    // ১২. স্বাগতম ও প্রমোশনাল পপআপ মডাল বন্ধের লজিক
    window.closeAttentionModal = () => {
        const attModal = document.getElementById('attentionModal');
        if (attModal) attModal.style.display = 'none';
        sessionStorage.setItem('welcomeShown', 'true'); // এক ব্রাউজার সেশনে আর দ্বিতীয়বার দেখাবে না
    };

    // ল্যাঙ্গুয়েজ ডিটেক্ট ও পেজ রেন্ডারিং ইনিশিয়ালাইজেশন
    window.addEventListener('load', () => {
        detectLanguageAndLocalize();
        
        const adultBtn = document.getElementById('adult-toggle-btn');
        if (isAdultMode) {
            adultBtn.classList.add('active');
        }
    });
</script>
</body>
</html>
